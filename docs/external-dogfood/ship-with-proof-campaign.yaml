# External dogfood: ship-with-proof on gemoji
# Target: https://github.com/github/gemoji
campaign: external-gemoji-ship-with-proof
repo: single
base: fleet/gemoji-ship-with-proof-base
start: audit
nodes:
  audit: { mission: adversarial-review-and-fix }
  tests: { mission: test-coverage }
  docs: { mission: doc-sync }
post_gates:
  - ship
  - health
edges:
  audit: [{ to: tests, if: always }]
  tests: [{ to: docs, if: always }]
  docs: []