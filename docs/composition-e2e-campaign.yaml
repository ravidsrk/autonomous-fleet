campaign: composition-e2e
# bug-batch is EXPLORATORY (docs/exploratory/missions/) — this example opts in
# explicitly; without this flag run-campaign.sh refuses the node (issue #94).
allow_exploratory_nodes: true
repo: single
base: fleet/composition-e2e-base
start: docs
nodes:
  docs: { mission: doc-sync }
  bugs: { mission: bug-batch }
  tests: { mission: test-coverage }
edges:
  docs:
    - { to: bugs, if: code_bug_findings > 0 }
    - { to: tests, if: always }
  bugs:
    - { to: tests, if: always }
  tests: []