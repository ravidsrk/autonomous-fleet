name: fleet-verify
description: Verify one autonomous-fleet run archive directory.
inputs:
  run-dir:
    description: Path to .fleet/runs/<run_id>/.
    required: true
  repo:
    description: Repository root for source verification.
    required: false
    default: .
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install Python dependencies
      shell: bash
      run: python -m pip install "PyYAML>=6.0"
    - name: Verify fleet run
      shell: bash
      env:
        RUN_DIR: ${{ inputs.run-dir }}
        REPO: ${{ inputs.repo }}
      run: |
        set -o pipefail
        python "${{ github.action_path }}/scripts/fleet_verify.py" "$RUN_DIR" --repo "$REPO" --json | tee "$GITHUB_STEP_SUMMARY"
