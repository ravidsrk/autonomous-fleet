name: docs-site

on:
  push:
    branches: [main]
    paths:
      - "docs/guide/**"
      - "docs-site/**"
      - "scripts/sync_guide_starlight.py"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Pin third-party Actions to full commit SHAs (SEC-004).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Sync guide markdown
        run: python3 scripts/sync_guide_starlight.py
      - name: Install and build
        working-directory: docs-site
        run: |
          npm install
          npm run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docs-site-dist
          path: docs-site/dist
          retention-days: 14